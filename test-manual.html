<!DOCTYPE html>
<html>
<head>
    <title>Keyboard Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .log { background: #f0f0f0; padding: 10px; margin: 10px 0; font-family: monospace; white-space: pre-wrap; }
        .success { color: green; }
        .error { color: red; }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Quiz Keyboard Test</h1>
    <p>Click the button below, then press number keys 1-4 to test.</p>
    <button onclick="startTest()">Start Test</button>
    <button onclick="clearLog()">Clear Log</button>
    <div id="log" class="log"></div>
    
    <script>
        const logEl = document.getElementById('log');
        
        function log(msg, isError) {
            const line = document.createElement('div');
            line.textContent = new Date().toLocaleTimeString() + ': ' + msg;
            line.className = isError ? 'error' : '';
            logEl.appendChild(line);
            console.log(msg);
        }
        
        function clearLog() {
            logEl.innerHTML = '';
        }
        
        function startTest() {
            clearLog();
            log('Test started. Press keys 1, 2, 3, 4...');
            
            document.addEventListener('keydown', function handler(e) {
                log(`Keydown: key="${e.key}" code="${e.code}" keyCode=${e.keyCode}`);
                
                // Simulate what the quiz does
                switch(e.key) {
                    case '1':
                    case '2':
                    case '3':
                    case '4':
                        e.preventDefault();
                        const num = parseInt(e.key) - 1;
                        log(`✅ Would select option ${num} (index ${num})`, false);
                        break;
                    default:
                        log(`Key "${e.key}" not handled`, true);
                }
            }, { once: true });
            
            setTimeout(() => {
                log('Test ended. Click "Start Test" to try again.');
            }, 5000);
        }
        
        log('Page loaded. Click "Start Test" to begin.');
    </script>
</body>
</html>
